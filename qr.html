<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR codes — FM Stocks</title>
  <link rel="icon" href="medias/favicon.png">
  <link rel="apple-touch-icon" href="medias/favicon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#F47D0D">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
  <style>
    .qr-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }
    .qr-card {
      background: #fff;
      color: #000;
      border-radius: var(--radius);
      padding: 18px;
      text-align: center;
    }
    .qr-card h3 { margin: 0 0 12px; }
    .qr-card .qr { display: inline-block; }
    .qr-card .url { font-size: .7rem; color: #555; margin-top: 10px; word-break: break-all; }
  </style>
</head>
<body>
  <header class="app no-print">
    <a class="logo-link" href="index.html" title="Retour au dashboard"><img class="brand-logo" src="medias/favicon.png" alt="Retour"></a>
    <h1>QR codes à imprimer</h1>
    <button onclick="window.print()">🖨️ Imprimer</button>
  </header>

  <main class="wrap">
    <p class="muted no-print">
      Un QR par remorque. Imprime cette page (A4) et colle chaque code sur la remorque
      correspondante : un scan ouvre directement sa page de stock.
    </p>
    <div class="qr-grid" id="grid"></div>
  </main>

  <script type="module">
    import { requireAccess } from "./auth.js";
    import { REMORQUES } from "./firebase-config.js";

    await requireAccess();

    const grid = document.getElementById("grid");
    for (const r of REMORQUES) {
      const url = new URL(`stocks/${r.id}.html`, location.href).href;
      const card = document.createElement("div");
      card.className = "qr-card";
      card.innerHTML = `<h3>🏰 ${r.nom}</h3><div class="qr"></div><div class="url">${url}</div>`;
      grid.appendChild(card);
      new QRCode(card.querySelector(".qr"), {
        text: url, width: 180, height: 180,
        colorDark: "#000000", colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.M
      });
    }
  </script>
</body>
</html>
