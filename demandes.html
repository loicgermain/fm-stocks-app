<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Réappro — FM Stocks</title>
  <link rel="icon" href="medias/favicon.png">
  <link rel="apple-touch-icon" href="medias/favicon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#F47D0D">
  <link rel="stylesheet" href="style.css">
  <style>
    .demande {
      display: flex; align-items: center; gap: 12px;
      padding: 14px; margin-bottom: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 5px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .demande.oubli { border-left-color: var(--danger); background: rgba(210,59,110,.08); }
    .demande.prise { border-left-color: var(--warn); }
    .demande.aprendre { border-left-color: var(--mauve); }
    .demande .d-info { flex: 1; min-width: 0; }
    .demande .d-titre { font-weight: 700; font-size: 1.05rem; }
    .demande .d-titre .q { color: var(--accent); }
    .demande .d-sub { color: var(--text-dim); font-size: .82rem; margin-top: 3px; }
    .demande .d-act { display: flex; flex-direction: column; gap: 6px; align-items: stretch; min-width: 116px; }
    .demande .d-act button { white-space: nowrap; }
    .demande .d-act .mini { font-size: .8rem; padding: 6px 8px; }
    .d-cancel { background: transparent; border: none; color: var(--text-dim); font-size: 1.1rem; padding: 4px 6px; align-self: center; }
    .demande .d-prog { color: var(--accent); font-weight: 600; }
    .sec-count { color: var(--text-dim); font-weight: 400; font-size: .85rem; }
  </style>
</head>
<body>
  <header class="app">
    <a class="back" href="index.html" title="Retour">‹</a>
    <h1>🚚 Réappro</h1>
  </header>

  <main class="wrap">
    <div id="empty" class="empty-state" style="display:none">
      Aucune demande en cours. ✅<br>Tout roule !
    </div>

    <section id="sec-oubli" style="display:none">
      <h2 style="color:var(--danger)">⚠️ Oubliées <span class="sec-count" id="n-oubli"></span></h2>
      <div id="list-oubli"></div>
    </section>

    <section id="sec-aprendre" style="display:none">
      <h2>À prendre <span class="sec-count" id="n-aprendre"></span></h2>
      <div id="list-aprendre"></div>
    </section>

    <section id="sec-encours" style="display:none">
      <h2>En cours <span class="sec-count" id="n-encours"></span></h2>
      <div id="list-encours"></div>
    </section>
  </main>

  <!-- Modale livraison (totale ou partielle) -->
  <div class="modal-bg" id="livr-modal">
    <form class="modal" id="livr-form" style="max-width:360px">
      <h3 id="livr-titre">Réappro livrée ✅</h3>
      <p class="muted" id="livr-info" style="margin-top:0"></p>
      <label for="livr-qte" id="livr-label">Quantité ajoutée au stock</label>
      <input id="livr-qte" type="number" min="0" step="1" inputmode="numeric">
      <div class="modal-actions">
        <button type="button" class="secondary" id="livr-sans">Sans toucher au stock</button>
        <button type="submit">Ajouter au stock</button>
      </div>
    </form>
  </div>

  <script type="module">
    import { requireAccess } from "./auth.js";
    import { mountSync, trackWrite } from "./sync.js";
    import { db, REMORQUES } from "./firebase-config.js";
    import { esc, toast, mountSunToggle } from "./app.js";
    import {
      ref, onValue, update, push, remove, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    await requireAccess();
    mountSunToggle();
    mountSync(db);

    const OUBLI_MS = 15 * 60 * 1000;   // une demande devient "oubliée" après 15 min
    const remNom = Object.fromEntries(REMORQUES.map(r => [r.id, r.nom]));

    // Bénévole (prénom partagé)
    const QUI_KEY = "fm-qui";
    const getQui = () => localStorage.getItem(QUI_KEY) || "";
    function ensureQui() {
      let q = getQui();
      if (!q) { q = (prompt("Ton prénom :") || "").trim(); if (q) localStorage.setItem(QUI_KEY, q); }
      return q;
    }

    let articles = {}, stocks = {}, demandes = {};
    onValue(ref(db, "articles"),  s => { articles = s.val() || {}; render(); });
    onValue(ref(db, "stocks"),    s => { stocks   = s.val() || {}; render(); });
    onValue(ref(db, "demandes"),  s => { demandes = s.val() || {}; render(); });

    function timeAgo(ts) {
      if (!ts) return "à l'instant";
      const sec = Math.max(0, Math.floor((Date.now() - ts) / 1000));
      if (sec < 60) return "à l'instant";
      const min = Math.floor(sec / 60);
      if (min < 60) return `il y a ${min} min`;
      const h = Math.floor(min / 60);
      return `il y a ${h} h ${String(min % 60).padStart(2, "0")}`;
    }

    function refTs(d) { return d.statut === "prise" ? (d.priseAt || d.demandeeAt) : d.demandeeAt; }
    function isOubli(d) {
      const t = refTs(d);
      return t ? (Date.now() - t > OUBLI_MS) : false;
    }

    function card(d) {
      const nom = articles[d.articleId]?.nom || d.articleId;
      const rem = remNom[d.remorqueId] || d.remorqueId;
      const oubli = isOubli(d);
      const cls = oubli ? "oubli" : (d.statut === "prise" ? "prise" : "aprendre");
      const livre = Number(d.livre) || 0;
      const reste = Math.max(0, (Number(d.qte) || 0) - livre);
      const prog = livre > 0
        ? ` · <span class="d-prog">déjà ${livre}/${esc(String(d.qte))} · reste ${reste}</span>`
        : "";
      let sub, action;
      if (d.statut === "prise") {
        sub = `${esc(rem)} · pris par <strong>${esc(d.prisePar || "?")}</strong> · ${timeAgo(d.priseAt)}${prog}`;
        action = `
          <button data-act="fait" data-id="${d.id}">C'est fait ✅</button>
          <button class="secondary mini" data-act="partiel" data-id="${d.id}">Partiel ➗</button>
          <button class="ghost mini" data-act="relacher" data-id="${d.id}">Relâcher ↩</button>`;
      } else {
        sub = `${esc(rem)} · demandé ${timeAgo(d.demandeeAt)}${d.demandeePar ? " · par " + esc(d.demandeePar) : ""}${prog}`;
        action = `<button data-act="prendre" data-id="${d.id}">Je prends 🙋</button>`;
      }
      return `
        <div class="demande ${cls}">
          <div class="d-info">
            <div class="d-titre"><span class="q">${esc(String(d.qte))}×</span> ${esc(nom)}</div>
            <div class="d-sub">${oubli ? "⚠️ " : ""}${sub}</div>
          </div>
          <div class="d-act">
            ${action}
            <button class="d-cancel" data-act="annuler" data-id="${d.id}" title="Annuler la demande">✕</button>
          </div>
        </div>`;
    }

    function render() {
      const list = Object.entries(demandes)
        .map(([id, d]) => ({ id, ...d }))
        .filter(d => d.statut !== "faite");

      // tri : plus ancienne demande d'abord
      list.sort((a, b) => (a.demandeeAt || 0) - (b.demandeeAt || 0));

      const oubli = list.filter(isOubli);
      const aprendre = list.filter(d => !isOubli(d) && d.statut !== "prise");
      const encours = list.filter(d => !isOubli(d) && d.statut === "prise");

      fillSection("oubli", oubli);
      fillSection("aprendre", aprendre);
      fillSection("encours", encours);

      document.getElementById("empty").style.display = list.length ? "none" : "block";
      wire();
    }

    function fillSection(key, arr) {
      document.getElementById("sec-" + key).style.display = arr.length ? "block" : "none";
      document.getElementById("n-" + key).textContent = arr.length ? `(${arr.length})` : "";
      document.getElementById("list-" + key).innerHTML = arr.map(card).join("");
    }

    function wire() {
      document.querySelectorAll('[data-act="prendre"]').forEach(b =>
        b.onclick = () => prendre(b.dataset.id));
      document.querySelectorAll('[data-act="fait"]').forEach(b =>
        b.onclick = () => openLivr(b.dataset.id, "fait"));
      document.querySelectorAll('[data-act="partiel"]').forEach(b =>
        b.onclick = () => openLivr(b.dataset.id, "partiel"));
      document.querySelectorAll('[data-act="relacher"]').forEach(b =>
        b.onclick = () => relacher(b.dataset.id));
      document.querySelectorAll('[data-act="annuler"]').forEach(b =>
        b.onclick = () => annuler(b.dataset.id));
    }

    async function prendre(id) {
      const qui = ensureQui();
      try {
        await trackWrite(update(ref(db, "demandes/" + id), {
          statut: "prise", prisePar: qui || "?", priseAt: serverTimestamp()
        }));
        toast("C'est noté, à toi de jouer 🙋");
      } catch (err) { toast("Erreur : " + err.message); }
    }

    // Relâcher une tâche prise : repart en "À prendre".
    // demandeeAt et la progression (livre) sont conservés → l'ancienneté
    // de la demande n'est pas faussée et le suivant voit ce qui reste.
    async function relacher(id) {
      try {
        await trackWrite(update(ref(db, "demandes/" + id), {
          statut: "demandee", prisePar: null, priseAt: null
        }));
        toast("Tâche relâchée, dispo pour un autre ↩");
      } catch (err) { toast("Erreur : " + err.message); }
    }

    async function annuler(id) {
      if (!confirm("Annuler cette demande de réappro ?")) return;
      try { await trackWrite(remove(ref(db, "demandes/" + id))); toast("Demande annulée"); }
      catch (err) { toast("Erreur : " + err.message); }
    }

    // --- Modale livraison : totale ("fait") ou partielle ("partiel") ---
    const livrModal = document.getElementById("livr-modal");
    let livrId = null, livrMode = "fait";

    function openLivr(id, mode) {
      const d = demandes[id]; if (!d) return;
      livrId = id; livrMode = mode;
      const nom = articles[d.articleId]?.nom || d.articleId;
      const rem = remNom[d.remorqueId] || d.remorqueId;
      const cur = stocks[d.remorqueId]?.[d.articleId]?.qte ?? 0;
      const livre = Number(d.livre) || 0;
      const reste = Math.max(0, (Number(d.qte) || 0) - livre);
      document.getElementById("livr-titre").textContent =
        mode === "fait" ? "Réappro terminée ✅" : "Livraison partielle ➗";
      document.getElementById("livr-label").textContent =
        mode === "fait" ? "Quantité ajoutée au stock" : "Quantité apportée maintenant";
      document.getElementById("livr-info").innerHTML =
        `<strong>${esc(String(d.qte))}× ${esc(nom)}</strong> pour <strong>${esc(rem)}</strong>.` +
        (livre > 0 ? `<br>Déjà livré : ${livre} · reste ${reste}.` : "") +
        `<br>Stock actuel : ${cur}.`;
      const input = document.getElementById("livr-qte");
      input.value = reste;
      input.max = reste;
      livrModal.classList.add("open");
      setTimeout(() => { input.focus(); input.select(); }, 50);
    }
    function closeLivr() { livrModal.classList.remove("open"); livrId = null; }

    // Applique la livraison. touchStock = ajouter ou non au stock remorque.
    async function applyLivr(touchStock) {
      const d = demandes[livrId]; if (!d) return;
      const qui = ensureQui();
      const add = Math.max(0, Number(document.getElementById("livr-qte").value) || 0);
      const livre = Number(d.livre) || 0;
      const newLivre = livre + add;
      // Statut final : "fait" clôt toujours ; "partiel" clôt si tout est livré.
      const fini = livrMode === "fait" || newLivre >= (Number(d.qte) || 0);
      try {
        if (touchStock && add > 0) {
          const cur = Number(stocks[d.remorqueId]?.[d.articleId]?.qte) || 0;
          await trackWrite(update(ref(db, `stocks/${d.remorqueId}/${d.articleId}`), { qte: cur + add }));
          await push(ref(db, "mouvements"), {
            remorqueId: d.remorqueId, articleId: d.articleId, type: "in", qte: add,
            qui: qui || null, note: "réappro", timestamp: serverTimestamp()
          });
        }
        const patch = fini
          ? { statut: "faite", livre: newLivre, faitePar: qui || "?", faiteAt: serverTimestamp() }
          : { livre: newLivre };
        await trackWrite(update(ref(db, "demandes/" + livrId), patch));
        toast(fini ? "Réappro livrée ✅" : `Partiel noté : ${newLivre}/${d.qte} ➗`);
        closeLivr();
      } catch (err) { toast("Erreur : " + err.message); }
    }

    document.getElementById("livr-form").addEventListener("submit", e => { e.preventDefault(); applyLivr(true); });
    document.getElementById("livr-sans").addEventListener("click", () => applyLivr(false));
    livrModal.addEventListener("click", e => { if (e.target === livrModal) closeLivr(); });

    // Rafraîchit les "il y a X min" et le passage en "oublié".
    // Économe : ne recalcule pas quand l'appli est en arrière-plan (batterie) ;
    // le retour au premier plan resynchronise via les listeners Firebase.
    setInterval(() => { if (!document.hidden) render(); }, 30000);
  </script>
</body>
</html>
