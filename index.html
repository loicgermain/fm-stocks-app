<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FM Stocks — Fête Médiévale</title>
  <link rel="icon" href="medias/favicon.png">
  <link rel="apple-touch-icon" href="medias/favicon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#F47D0D">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app">
    <img class="brand-logo" src="medias/favicon.png" alt="Fête Médiévale">
    <h1>FM Stocks</h1>
    <button id="qui-btn" class="chip" title="Changer de bénévole">👤 …</button>
    <button id="role-btn" class="chip" title="Changer de rôle / équipe">🔓 …</button>
    <a id="nav-catalogue" class="chip" href="admin.html" style="text-decoration:none">📚 Catalogue</a>
  </header>

  <main class="wrap">
    <p class="muted">Stocks des remorques frigo — Fête Médiévale de Remouchamps</p>

    <div class="search-wrap">
      <input type="search" id="search" placeholder="🔍 Rechercher un article…" autocomplete="off">
      <div id="search-results" class="search-results"></div>
    </div>

    <div class="grid" id="tiles"></div>

    <h2>Alertes</h2>
    <div id="alertes"><p class="muted">Chargement…</p></div>

    <p class="center" style="margin-top:28px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap">
      <a class="btn secondary" href="bilan.html">📊 Bilan</a>
      <a class="btn secondary" href="historique.html">📜 Historique</a>
      <a class="btn secondary" id="nav-qr" href="qr.html">🖨️ QR codes à imprimer</a>
    </p>
    <p class="center" id="nav-cuisine-back" style="margin-top:12px;display:none">
      <a class="btn" href="cuisine-dashboard.html">🍳 Dashboard Cuisine</a>
    </p>
    <p class="center muted" style="font-size:.75rem;margin-top:24px" id="version"></p>
  </main>

  <script type="module">
    import { requireAccess, clearAccess } from "./auth.js";
    import { mountSync } from "./sync.js";
    import { db, REMORQUES } from "./firebase-config.js";
    import * as cfg from "./firebase-config.js";   // version lue sans casser si absente
    import { esc, stockStatus, mountSunToggle, isAdmin, getMyRemorques, getPerm, getRole } from "./app.js";
    import { ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    await requireAccess();
    // Cuisine a son propre dashboard
    if (getRole() === "cuisine" && !new URLSearchParams(location.search).has("general")) {
      location.replace("cuisine-dashboard.html");
    }
    mountSunToggle();
    mountSync(db);
    document.getElementById("version").textContent = "FM Stocks · version " + (cfg.APP_VERSION || "?");

    // --- Bénévole (nom partagé avec les pages remorques) ---
    const QUI_KEY = "fm-qui";
    const getQui = () => localStorage.getItem(QUI_KEY) || "";
    function renderQui() {
      const q = getQui();
      document.getElementById("qui-btn").textContent = q ? `👤 ${q}` : "👤 (moi)";
    }
    renderQui();
    document.getElementById("qui-btn").addEventListener("click", () => {
      const q = (prompt("Ton prénom :", getQui()) || "").trim();
      if (q) { localStorage.setItem(QUI_KEY, q); renderQui(); }
    });

    // --- Rôle ---
    function renderRole() {
      const labels = { admin: "Admin", logistique: "Logistique", poste: "Poste", cuisine: "Cuisine" };
      const id = localStorage.getItem("fm-role") || "";
      document.getElementById("role-btn").textContent = `🔓 ${labels[id] || id || "?"}`;
    }
    renderRole();
    document.getElementById("role-btn").addEventListener("click", () => {
      if (!confirm("Changer d'équipe ? Tu devras entrer un nouveau code.")) return;
      clearAccess();
      location.reload();
    });

    // Catalogue et QR codes visibles uniquement pour les admins
    if (!isAdmin()) {
      document.getElementById("nav-catalogue").style.display = "none";
      const qr = document.getElementById("nav-qr");
      if (qr) qr.style.display = "none";
    }

    // Lien retour dashboard cuisine visible uniquement pour le profil cuisine
    if (getRole() === "cuisine") {
      document.getElementById("nav-cuisine-back").style.display = "";
    }

    let articles = {}, stocks = {}, mouvements = {};

    onValue(ref(db, "articles"),   s => { articles   = s.val() || {}; render(); });
    onValue(ref(db, "stocks"),     s => { stocks     = s.val() || {}; render(); });
    onValue(ref(db, "mouvements"), s => { mouvements = s.val() || {}; render(); });

    function render() {
      renderTiles();
      renderAlertes();
      renderSearch(document.getElementById("search").value);
    }

    function renderSearch(q) {
      const el = document.getElementById("search-results");
      if (!q.trim()) { el.innerHTML = ""; return; }
      const lq = q.toLowerCase();
      const matches = Object.entries(articles)
        .filter(([, a]) => (a.nom || "").toLowerCase().includes(lq))
        .map(([aid, a]) => {
          const locs = REMORQUES.flatMap(r => {
            const sv = (stocks[r.id] || {})[aid];
            if (!sv) return [];
            const qte = Number(sv.qte) || 0;
            return [{ nom: r.nom, qte, s: stockStatus(qte, sv.seuilAlerte) }];
          });
          return { nom: a.nom, locs };
        })
        .filter(m => m.locs.length > 0);
      if (!matches.length) {
        el.innerHTML = `<p class="muted" style="margin:8px 0">Aucun article trouvé.</p>`;
        return;
      }
      el.innerHTML = matches.map(m => `
        <div class="card search-result-card">
          <strong>${esc(m.nom)}</strong>
          <div class="search-locs">
            ${m.locs.map(l => `<span class="badge ${l.s}">${esc(l.nom)}&nbsp;·&nbsp;${l.qte}</span>`).join("")}
          </div>
        </div>`).join("");
    }

    document.getElementById("search").addEventListener("input", e => renderSearch(e.target.value));

    function statsFor(remId) {
      const st = stocks[remId] || {};
      let total = 0, low = 0, empty = 0;
      for (const aid of Object.keys(st)) {
        total++;
        const s = stockStatus(st[aid].qte, st[aid].seuilAlerte);
        if (s === "empty") empty++;
        else if (s === "low") low++;
      }
      return { total, low, empty };
    }

    function relTime(ts) {
      if (!ts) return null;
      const min = Math.floor((Date.now() - ts) / 60000);
      if (min < 2)  return "à l'instant";
      if (min < 60) return `il y a ${min} min`;
      const h = Math.floor(min / 60);
      if (h < 24)   return `il y a ${h}h`;
      return `il y a ${Math.floor(h / 24)}j`;
    }

    function lastUpdateFor(remId) {
      let maxTs = 0;
      for (const m of Object.values(mouvements)) {
        if (m.remorqueId === remId && (m.timestamp || 0) > maxTs) maxTs = m.timestamp;
      }
      return maxTs || null;
    }

    function renderTiles() {
      const myRem = getMyRemorques();
      const visible = myRem ? REMORQUES.filter(r => myRem.includes(r.id)) : REMORQUES;
      document.getElementById("tiles").innerHTML = visible.map(r => {
        const { total, low, empty } = statsFor(r.id);
        const alerte = empty + low > 0;
        const meta = total === 0
          ? "Aucun stock"
          : `${total} article${total > 1 ? "s" : ""}` +
            (empty ? ` · ${empty} vide${empty > 1 ? "s" : ""}` : "") +
            (low ? ` · ${low} bas` : "");
        const last = relTime(lastUpdateFor(r.id));
        return `
          <a class="remorque-tile ${alerte ? "alerte" : ""}" href="stocks/${r.id}.html">
            <div class="nom">${esc(r.nom)}</div>
            <div class="meta">${meta}</div>
            ${last ? `<div class="meta" style="margin-top:4px;font-size:.75rem">🕐 ${last}</div>` : ""}
          </a>`;
      }).join("");
    }

    function renderAlertes() {
      const rows = [];
      const myRem = getMyRemorques();
      const visibleRems = myRem ? REMORQUES.filter(r => myRem.includes(r.id)) : REMORQUES;
      for (const r of visibleRems) {
        const st = stocks[r.id] || {};
        for (const aid of Object.keys(st)) {
          const s = stockStatus(st[aid].qte, st[aid].seuilAlerte);
          if (s === "ok") continue;
          const nom = articles[aid]?.nom || aid;
          rows.push({ rem: r, nom, qte: st[aid].qte || 0, s });
        }
      }
      const el = document.getElementById("alertes");
      if (!rows.length) {
        el.innerHTML = `<p class="muted">✅ Aucune alerte, tous les stocks sont au-dessus du seuil.</p>`;
        return;
      }
      rows.sort((a, b) => (a.s === "empty" ? -1 : 1) - (b.s === "empty" ? -1 : 1));
      el.innerHTML = rows.map(x => `
        <div class="card" style="display:flex;align-items:center;gap:10px">
          <span class="badge ${x.s === "empty" ? "danger" : "warn"}">
            ${x.s === "empty" ? "VIDE" : "BAS"}
          </span>
          <div style="flex:1">
            <strong>${esc(x.nom)}</strong>
            <div class="muted" style="font-size:.85rem">${esc(x.rem.nom)} — reste ${x.qte}</div>
          </div>
          <a class="btn secondary" href="stocks/${x.rem.id}.html">Voir</a>
        </div>`).join("");
    }
  </script>
</body>
</html>
